<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Math Calculator</title>
    <meta name="description"
        content="A simple and clean basic math calculator application built with HTML, CSS, and JavaScript.">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="calculator-card" id="calculator">
        <h1 class="calculator-title">Basic Math Calculator</h1>

        <div class="inner-box">
            <div class="inputs-row">
                <input type="number" id="num1" placeholder="Input number" aria-label="First Number">
                <input type="number" id="num2" placeholder="Input number" aria-label="Second Number">
            </div>
